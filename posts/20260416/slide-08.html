<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1350px;overflow:hidden;font-family:'Noto Sans JP',sans-serif}
.tc{position:absolute;width:54px;height:54px;border-style:solid;border-color:rgba(201,168,76,0.6);filter:drop-shadow(0 0 4px rgba(201,168,76,0.35))}
.tc.tl{top:38px;left:38px;border-width:2px 0 0 2px}.tc.tr{top:38px;right:38px;border-width:2px 2px 0 0}
.tc.bl{bottom:38px;left:38px;border-width:0 0 2px 2px}.tc.br{bottom:38px;right:38px;border-width:0 2px 2px 0}
.tc::before{content:'';position:absolute;width:7px;height:7px;border-radius:50%;background:#c9a84c;box-shadow:0 0 10px rgba(201,168,76,0.9),0 0 18px rgba(201,168,76,0.4)}
.tc.tl::before{top:-4px;left:-4px}.tc.tr::before{top:-4px;right:-4px}
.tc.bl::before{bottom:-4px;left:-4px}.tc.br::before{bottom:-4px;right:-4px}
body{
  background-image:
    radial-gradient(circle,rgba(201,168,76,0.055) 1px,transparent 1px),
    radial-gradient(ellipse 80% 60% at 50% 45%,#162040 0%,#0b1629 65%);
  background-size:44px 44px,100% 100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:70px 80px;position:relative;color:#fff;text-align:center;
}
.photo-wrap{
  width:380px;height:380px;border-radius:50%;overflow:hidden;flex-shrink:0;
  border:5px solid #c9a84c;
  box-shadow:0 0 0 5px #0b1629,0 0 0 10px rgba(201,168,76,0.45),0 0 30px rgba(201,168,76,0.25);
  margin-bottom:30px;
}
.photo-wrap img{width:100%;height:100%;object-fit:cover;object-position:50% 12%}
.name{font-size:54px;font-weight:900;color:#fff;letter-spacing:6px;margin-bottom:6px}
.name-en{font-size:19px;color:rgba(201,168,76,0.6);letter-spacing:5px;font-weight:300;margin-bottom:18px}
.title{font-size:24px;color:#c9a84c;font-weight:700;line-height:1.6;margin-bottom:14px}
.tagline{font-size:20px;color:rgba(255,255,255,0.72);line-height:1.8;margin-bottom:28px}
.divider{width:300px;height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.65),transparent);margin:0 auto 28px;box-shadow:0 0 6px rgba(201,168,76,0.25)}
.services{display:flex;gap:36px;justify-content:center}
.service{display:flex;flex-direction:column;align-items:center;gap:10px;width:180px}
.sicon{width:68px;height:68px;border-radius:50%;border:1.5px solid rgba(201,168,76,0.5);display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,0.06);box-shadow:0 0 12px rgba(201,168,76,0.12)}
.sicon svg{width:34px;height:34px}
.slabel{font-size:18px;color:rgba(255,255,255,0.85);font-weight:500}
</style></head>
<body>
  <div class="tc tl"></div><div class="tc tr"></div>
  <div class="tc bl"></div><div class="tc br"></div>
  <div class="photo-wrap"><img src="profile.jpg" alt="勝目麻希"></div>
  <div class="name">勝目 麻希</div>
  <div class="name-en">Maki Katsume</div>
  <div class="title">フリーランスライター・AI活用インストラクター</div>
  <div class="tagline">言葉の力で心を動かし、<br>AIの力で可能性を広げる</div>
  <div class="divider"></div>
  <div class="services">
    <div class="service">
      <div class="sicon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="9" r="5"/><line x1="9" y1="17" x2="15" y2="17"/><line x1="10" y1="20" x2="14" y2="20"/>
          <line x1="9" y1="14" x2="9" y2="17"/><line x1="15" y1="14" x2="15" y2="17"/>
        </svg>
      </div>
      <div class="slabel">AI活用講座</div>
    </div>
    <div class="service">
      <div class="sicon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
      </div>
      <div class="slabel">導入サポート</div>
    </div>
    <div class="service">
      <div class="sicon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </div>
      <div class="slabel">コンテンツ制作</div>
    </div>
  </div>
</body></html>
