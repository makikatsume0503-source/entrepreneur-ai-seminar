<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AIで時短できる仕事7選 カルーセル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1629;font-family:'Noto Sans JP',sans-serif;padding:48px 40px}
h1{color:#c9a84c;text-align:center;font-size:32px;margin-bottom:8px;letter-spacing:2px}
.sub{color:rgba(255,255,255,0.4);text-align:center;font-size:14px;margin-bottom:40px;letter-spacing:1px}
.dl-all{text-align:center;margin-bottom:48px}
.dl-all button{background:linear-gradient(135deg,#c9a84c,#a07830);color:#fff;border:none;
  padding:16px 56px;border-radius:10px;font-size:20px;font-weight:bold;cursor:pointer;
  letter-spacing:2px;box-shadow:0 6px 24px rgba(201,168,76,0.3);}
.dl-all button:hover{opacity:0.9}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1400px;margin:0 auto}
.card{background:#162040;border-radius:14px;overflow:hidden;border:1px solid rgba(201,168,76,0.15)}
.card-preview{width:100%;aspect-ratio:4/5;overflow:hidden;cursor:pointer;position:relative;}
.card-preview iframe{width:1080px;height:1350px;transform-origin:top left;border:none;pointer-events:none;}
.info{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.name{color:#fff;font-size:13px;font-weight:500;flex:1}
.btn-group{display:flex;gap:6px;flex-shrink:0}
.html-btn{background:rgba(201,168,76,0.15);color:#c9a84c;padding:6px 14px;border-radius:7px;
  text-decoration:none;font-weight:700;font-size:12px;white-space:nowrap;border:1px solid rgba(201,168,76,0.3);}
.dl-btn{background:#c9a84c;color:#0b1629;padding:6px 14px;border-radius:7px;
  text-decoration:none;font-weight:700;font-size:12px;white-space:nowrap;}
.dl-btn:hover{background:#a07830}
</style>
</head>
<body>
<h1>AIで時短できる仕事 7選</h1>
<p class="sub">全9枚 · 1080×1350px · Instagram縦型</p>
<div class="dl-all"><button onclick="downloadAllPng()">📷 全スライドをPNGで開く</button></div>
<div class="grid" id="grid"></div>
<script>
const slides=[
  {n:'01',label:'表紙'},
  {n:'02',label:'① メール・返信文'},
  {n:'03',label:'② SNS投稿'},
  {n:'04',label:'③ 議事録・要約'},
  {n:'05',label:'④ リサーチ'},
  {n:'06',label:'⑤ 提案書・見積書'},
  {n:'07',label:'⑥ ブログ・コラム'},
  {n:'08',label:'⑦ キャッチコピー'},
  {n:'09',label:'CTA'},
];
const grid=document.getElementById('grid');
slides.forEach(s=>{
  const card=document.createElement('div');
  card.className='card';
  card.innerHTML=`
    <div class="card-preview" onclick="window.open('slide-${s.n}.html')">
      <iframe src="slide-${s.n}.html" scrolling="no"></iframe>
    </div>
    <div class="info">
      <span class="name">slide-${s.n} ${s.label}</span>
      <div class="btn-group">
        <a class="html-btn" href="slide-${s.n}.html" target="_blank">表示</a>
        <a class="dl-btn" href="slide-${s.n}.html?dl=png" target="_blank">📷 PNG</a>
      </div>
    </div>`;
  grid.appendChild(card);
});
function scaleFrames(){
  document.querySelectorAll('.card-preview').forEach(card=>{
    const w=card.clientWidth;
    const scale=w/1080;
    const iframe=card.querySelector('iframe');
    if(iframe){iframe.style.transform=`scale(${scale})`;card.style.height=(1350*scale)+'px';}
  });
}
window.addEventListener('load',scaleFrames);
window.addEventListener('resize',scaleFrames);
function downloadAllPng(){
  slides.forEach((s,i)=>setTimeout(()=>window.open(`slide-${s.n}.html?dl=png`),i*800));
}
</script>
</body>
</html>
