<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>今すぐ使えるAI 5選 カルーセル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b1629;font-family:'Noto Sans JP',sans-serif;padding:48px 40px}
h1{color:#c9a84c;text-align:center;font-size:32px;margin-bottom:8px;letter-spacing:2px}
.sub{color:rgba(255,255,255,0.4);text-align:center;font-size:14px;margin-bottom:40px;letter-spacing:1px}
.dl-all{text-align:center;margin-bottom:48px}
.dl-all button{background:linear-gradient(135deg,#c9a84c,#a07830);color:#fff;border:none;
  padding:16px 56px;border-radius:10px;font-size:20px;font-weight:bold;cursor:pointer;
  letter-spacing:2px;box-shadow:0 6px 24px rgba(201,168,76,0.3);}
.dl-all button:hover{opacity:0.9}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;max-width:1400px;margin:0 auto}
.card{background:#162040;border-radius:14px;overflow:hidden;border:1px solid rgba(201,168,76,0.15)}
.card-preview{width:100%;aspect-ratio:4/5;display:flex;align-items:center;justify-content:center;
  background:#162040;overflow:hidden;cursor:pointer;position:relative;}
.card-preview iframe{width:1080px;height:1350px;transform-origin:top left;border:none;pointer-events:none;}
.info{padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
.name{color:#fff;font-size:14px;font-weight:500}
.dl-btn{background:#c9a84c;color:#0b1629;padding:7px 18px;border-radius:7px;
  text-decoration:none;font-weight:700;font-size:13px;white-space:nowrap;}
.dl-btn:hover{background:#a07830}
</style>
</head>
<body>
<h1>今すぐ使えるAI 5選</h1>
<p class="sub">全7枚 · 1080×1350px · Instagram縦型</p>
<div class="dl-all"><button onclick="downloadAll()">⬇ すべてダウンロード</button></div>
<div class="grid" id="grid">
  <div class="card">
    <div class="card-preview" onclick="window.open('slide-01.html')">
      <iframe src="slide-01.html" scrolling="no" id="f1"></iframe>
    </div>
    <div class="info">
      <span class="name">slide-01 表紙</span>
      <a class="dl-btn" href="slide-01.html" download="slide-01.html">DL</a>
    </div>
  </div>
  <div class="card">
    <div class="card-preview" onclick="window.open('slide-02.html')">
      <iframe src="slide-02.html" scrolling="no" id="f2"></iframe>
    </div>
    <div class="info">
      <span class="name">slide-02 ChatGPT</span>
      <a class="dl-btn" href="slide-02.html" download="slide-02.html">DL</a>
    </div>
  </div>
  <div class="card">
    <div class="card-preview" onclick="window.open('slide-03.html')">
      <iframe src="slide-03.html" scrolling="no" id="f3"></iframe>
    </div>
    <div class="info">
      <span class="name">slide-03 Gemini</span>
      <a class="dl-btn" href="slide-03.html" download="slide-03.html">DL</a>
    </div>
  </div>
  <div class="card">
    <div class="card-preview" onclick="window.open('slide-04.html')">
      <iframe src="slide-04.html" scrolling="no" id="f4"></iframe>
    </div>
    <div class="info">
      <span class="name">slide-04 Claude</span>
      <a class="dl-btn" href="slide-04.html" download="slide-04.html">DL</a>
    </div>
  </div>
  <div class="card">
    <div class="card-preview" onclick="window.open('slide-05.html')">
      <iframe src="slide-05.html" scrolling="no" id="f5"></iframe>
    </div>
    <div class="info">
      <span class="name">slide-05 NotebookLM</span>
      <a class="dl-btn" href="slide-05.html" download="slide-05.html">DL</a>
    </div>
  </div>
  <div class="card">
    <div class="card-preview" onclick="window.open('slide-06.html')">
      <iframe src="slide-06.html" scrolling="no" id="f6"></iframe>
    </div>
    <div class="info">
      <span class="name">slide-06 Perplexity</span>
      <a class="dl-btn" href="slide-06.html" download="slide-06.html">DL</a>
    </div>
  </div>
  <div class="card">
    <div class="card-preview" onclick="window.open('slide-07.html')">
      <iframe src="slide-07.html" scrolling="no" id="f7"></iframe>
    </div>
    <div class="info">
      <span class="name">slide-07 CTA</span>
      <a class="dl-btn" href="slide-07.html" download="slide-07.html">DL</a>
    </div>
  </div>
</div>
<script>
// Scale iframes to fit card preview area
function scaleFrames(){
  document.querySelectorAll('.card-preview').forEach(card=>{
    const w=card.clientWidth;
    const scale=w/1080;
    const iframe=card.querySelector('iframe');
    if(iframe){
      iframe.style.transform=`scale(${scale})`;
      card.style.height=(1350*scale)+'px';
    }
  });
}
window.addEventListener('load',scaleFrames);
window.addEventListener('resize',scaleFrames);

function downloadAll(){
  document.querySelectorAll('.dl-btn').forEach((a,i)=>setTimeout(()=>a.click(),i*500));
}
</script>
</body>
</html>
